<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amina Bakacheva - Portfolio Robotique</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6a0dad;
            --secondary: #000;
            --neon: #0ff;
            --bg: #0a0a12;
        }
        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: rgba(10,10,18,0.9);
            padding: 4rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--primary);
        }
        h1 {
            color: var(--neon);
            text-shadow: 0 0 15px var(--primary);
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }
        p.subtitle {
            color: var(--neon);
            font-size: 1.2rem;
            margin-top: 1rem;
        }
        main {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .project-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--primary);
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.3s;
        }
        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(106,13,173,0.5);
            border-color: var(--neon);
        }
    </style>
</head>
<body>
    <header>
        <h1>> AMINA_BAKACHEVA</h1>
        <p class="subtitle">DEVELOPPEUSE_ROBOTIQUE | DESIGNER_INTERACTIF</p>
    </header>

    <main>
        <h2>> MES_PROJETS</h2>
        <div class="project-grid">
            <div class="project-card">
                <h3>> PROJET_WEB</h3>
                <p>Site vitrine avec intégration API</p>
            </div>
            <div class="project-card">
                <h3>> DESIGN_PRINT</h3>
                <p>Affiche événementielle tech</p>
            </div>
            <div class="project-card">
                <h3>> APP_MOBILE</h3>
                <p>UI/UX pour contrôle robotique</p>
            </div>
        </div>
    </main>
</body>
</html>
