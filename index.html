<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Amina Bakacheva</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Orbitron', sans-serif;
    }
  </style>
</head>
<body class="bg-black text-white">

  <!-- Section d'accueil -->
  <section class="min-h-screen flex items-center justify-center px-6 py-12">
    <div class="max-w-6xl w-full grid md:grid-cols-2 gap-12 items-center">
      
      <!-- IMAGE -->
      <div class="flex justify-center md:justify-end">
        <img src="./copie-de-photo.png" alt="Portrait d'Amina Bakacheva" class="rounded-2xl shadow-lg w-full max-w-sm object-cover">
      </div>

      <!-- TEXTE DE PRÉSENTATION -->
      <div class="space-y-6 text-left">
        <h1 class="text-4xl md:text-5xl font-bold text-cyan-400 leading-tight">
          Bonjour, je suis <span class="text-white">Amina Bakacheva</span>
        </h1>
        <p class="text-lg md:text-xl text-gray-300">
          Étudiante en <strong>développement web</strong> et <strong>design numérique</strong> à ETT Bordeaux.
          Passionnée par l'innovation, le design cyberpunk et l'interaction entre technologie et esthétique.
        </p>
        <a href="#projets" class="inline-block bg-cyan-500 text-white py-3 px-6 rounded-full shadow-md hover:bg-cyan-600 transition duration-300">
          Voir mes projets
        </a>
      </div>

    </div>
  </section>

</body>
</html>
