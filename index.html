<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amina Bakacheva - Portfolio Robotique</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6a0dad;
            --secondary: #000;
            --neon: #0ff;
            --bg: #0a0a12;
        }
        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0;
            overflow-x: hidden;
        }
        header {
            background: rgba(10,10,18,0.9);
            padding: 3rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--primary);
        }
        h1 {
            color: var(--neon);
            text-shadow: 0 0 10px var(--primary);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>> AMINA_BAKACHEVA</h1>
        <p style="color: var(--neon);">DEVELOPPEUSE_ROBOTIQUE | DESIGNER_INTERACTIF</p>
    </header>
</body>
</html>
